<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Portfolio</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              display: ['Clash Display', 'Space Grotesk', 'sans-serif'],
              body: ['Inter', 'sans-serif'],
            },
            colors: {
              accent: '#7c3aed',
              accentLight: '#a78bfa',
              accentDark: '#5b21b6',
              aurora1: '#7c3aed',
              aurora2: '#2563eb',
              aurora3: '#06b6d4',
            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'float2': 'float 8s ease-in-out infinite 2s',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4,0,0.6,1) infinite',
              'aurora': 'aurora 12s ease infinite',
              'fadeUp': 'fadeUp 0.7s ease forwards',
              'spin-slow': 'spin 20s linear infinite',
            },
            keyframes: {
              float: {
                '0%,100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              aurora: {
                '0%,100%': { backgroundPosition: '0% 50%' },
                '50%': { backgroundPosition: '100% 50%' },
              },
              fadeUp: {
                from: { opacity: '0', transform: 'translateY(30px)' },
                to:   { opacity: '1', transform: 'translateY(0)' },
              },
            },
            backgroundSize: {
              '300%': '300%',
            },
          },
        },
      }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Inter', sans-serif; }
      h1,h2,h3,h4 { font-family: 'Space Grotesk', sans-serif; }

      /* Aurora animated background */
      .aurora-bg {
        background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e, #16213e, #0d1b2a);
        background-size: 400% 400%;
        animation: aurora 12s ease infinite;
      }

      /* Glowing orbs */
      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.25;
        animation: float 8s ease-in-out infinite;
        pointer-events: none;
      }

      /* Glass card */
      .glass {
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.1);
      }

      /* Light glass */
      .glass-light {
        background: rgba(255,255,255,0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.6);
      }

      /* Gradient text */
      .gradient-text {
        background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Skill bar animation */
      .skill-fill { transition: width 1.5s cubic-bezier(0.4,0,0.2,1) 0.5s; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: #0f0c29; }
      ::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 3px; }

      /* Nav active */
      .nav-link-active { color: #a78bfa !important; }

      @keyframes aurora {
        0%,100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
      }
      @keyframes float {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-24px); }
      }
      @keyframes fadeUp {
        from { opacity:0; transform:translateY(28px); }
        to   { opacity:1; transform:translateY(0); }
      }
      .fade-up { animation: fadeUp 0.7s ease forwards; }
      .delay-1 { animation-delay: 0.1s; opacity:0; }
      .delay-2 { animation-delay: 0.25s; opacity:0; }
      .delay-3 { animation-delay: 0.4s; opacity:0; }
      .delay-4 { animation-delay: 0.55s; opacity:0; }
    </style>
  </head>
  <body class="aurora-bg min-h-screen text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
